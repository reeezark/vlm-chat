services:
  vlm-chat:
    build: .
    image: vlm-chat-assistant:latest
    container_name: vlm-chat-assistant
    ports:
      - "7860:7860"
    environment:
      # 必填：模型 API 密钥（也可通过 .env 文件注入）
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # 容器内监听全部网卡
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-dashscope}
      # 可选：登录鉴权
      - GRADIO_AUTH_USER=${GRADIO_AUTH_USER:-}
      - GRADIO_AUTH_PASSWORD=${GRADIO_AUTH_PASSWORD:-}
    volumes:
      # 持久化会话数据库与上传图片
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
