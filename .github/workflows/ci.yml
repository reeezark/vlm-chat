name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run quality gate
        run: scripts/ci_check.sh

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t vlm-chat-assistant:test .

      - name: Start container
        run: |
          docker run -d --name vlm-chat-assistant-test \
            -e DASHSCOPE_API_KEY=dummy-key \
            -e GRADIO_SERVER_NAME=0.0.0.0 \
            -e GRADIO_SERVER_PORT=7860 \
            -p 7860:7860 \
            vlm-chat-assistant:test

      - name: Check health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:7860/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs vlm-chat-assistant-test
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f vlm-chat-assistant-test || true
